<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Flyer Scan">
<meta name="theme-color" content="#0a0a0a">
<title>Flyer Scan</title>
<link rel="manifest" href="manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a0a;
    --surface: #141414;
    --surface2: #1e1e1e;
    --border: #2a2a2a;
    --accent: #e8ff47;
    --accent-dim: rgba(232,255,71,0.12);
    --text: #f0f0f0;
    --muted: #666;
    --sans: 'Syne', sans-serif;
    --mono: 'DM Mono', monospace;
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
  }

  body {
    display: flex;
    flex-direction: column;
    min-height: 100dvh;
  }

  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 20px 20px 0;
    flex-shrink: 0;
  }

  .logo {
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--accent);
    font-family: var(--mono);
  }

  .status-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--muted);
  }

  .status-dot.ready { background: var(--accent); }

  .reload-btn {
    background: none;
    border: none;
    cursor: pointer;
    padding: 4px;
    display: flex;
    align-items: center;
    justify-content: center;
    -webkit-tap-highlight-color: transparent;
    opacity: 0.4;
    transition: opacity 0.15s;
  }
  .reload-btn:active { opacity: 1; }
  .reload-btn svg { width: 16px; height: 16px; stroke: var(--text); fill: none; }

  main {
    flex: 1;
    display: flex;
    flex-direction: column;
    padding: 24px 20px 20px;
    gap: 16px;
  }

  /* Drop zone */
  .drop-zone {
    position: relative;
    border: 1.5px dashed var(--border);
    border-radius: 20px;
    min-height: 220px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
    overflow: hidden;
    flex-shrink: 0;
  }

  .drop-zone:active { border-color: var(--accent); background: var(--accent-dim); }
  .drop-zone.drag-over { border-color: var(--accent); background: var(--accent-dim); }

  .drop-zone.has-image {
    border-style: solid;
    border-color: var(--border);
  }

  .drop-zone img.preview {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    border-radius: 18px;
    opacity: 0.6;
  }

  .drop-zone .overlay-text {
    position: relative;
    z-index: 1;
    text-align: center;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
  }

  .drop-zone.has-image .overlay-text {
    background: rgba(10,10,10,0.7);
    padding: 10px 18px;
    border-radius: 12px;
    backdrop-filter: blur(4px);
  }

  .drop-icon {
    width: 48px;
    height: 48px;
    border-radius: 14px;
    background: var(--surface2);
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 4px;
  }

  .drop-icon svg { width: 22px; height: 22px; stroke: var(--muted); fill: none; }

  .drop-label {
    font-size: 14px;
    font-weight: 600;
    color: var(--text);
  }

  .drop-sub {
    font-size: 12px;
    color: var(--muted);
    font-family: var(--mono);
  }

  /* Buttons row */
  .btn-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    flex-shrink: 0;
  }

  .btn {
    height: 48px;
    border-radius: 14px;
    border: 1.5px solid var(--border);
    background: var(--surface);
    color: var(--text);
    font-family: var(--sans);
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    transition: all 0.15s;
    letter-spacing: 0.02em;
    -webkit-tap-highlight-color: transparent;
  }

  .btn:active { transform: scale(0.97); background: var(--surface2); }

  .btn.primary {
    background: var(--accent);
    color: #0a0a0a;
    border-color: var(--accent);
    grid-column: 1 / -1;
    height: 54px;
    font-size: 14px;
    letter-spacing: 0.04em;
  }

  .btn.primary:active { background: #d4e83f; }
  .btn.primary:disabled { background: var(--surface2); color: var(--muted); border-color: var(--border); cursor: default; transform: none; }

  .btn svg { width: 16px; height: 16px; stroke: currentColor; fill: none; flex-shrink: 0; }
  .btn.primary svg { stroke: #0a0a0a; }

  /* Result card */
  .result-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    overflow: hidden;
    display: none;
    flex-direction: column;
  }

  .result-card.visible { display: flex; }

  .result-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 18px;
    border-bottom: 1px solid var(--border);
  }

  .result-title {
    font-size: 11px;
    font-family: var(--mono);
    color: var(--muted);
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  .result-badge {
    font-size: 10px;
    font-family: var(--mono);
    background: var(--accent-dim);
    color: var(--accent);
    padding: 3px 8px;
    border-radius: 6px;
    letter-spacing: 0.06em;
  }

  .event-text {
    padding: 18px;
    font-family: var(--mono);
    font-size: 14px;
    line-height: 1.8;
    color: var(--text);
    white-space: pre-wrap;
    word-break: break-word;
    user-select: all;
    -webkit-user-select: all;
    cursor: text;
  }

  .event-text .highlight {
    color: var(--accent);
    font-weight: 500;
  }

  .copy-hint {
    padding: 10px 18px 14px;
    font-size: 11px;
    font-family: var(--mono);
    color: var(--muted);
    border-top: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .copy-hint svg { width: 12px; height: 12px; stroke: var(--muted); fill: none; flex-shrink: 0; }

  /* Loading state */
  .loading-state {
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 14px;
    padding: 32px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
  }

  .loading-state.visible { display: flex; }

  .spinner {
    width: 32px;
    height: 32px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .loading-text {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--muted);
    letter-spacing: 0.06em;
  }

  .loading-sub {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--border);
    animation: pulse 1.5s ease-in-out infinite;
  }

  @keyframes pulse { 0%, 100% { opacity: 0.4; } 50% { opacity: 1; } }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--text);
    color: var(--bg);
    padding: 10px 20px;
    border-radius: 100px;
    font-size: 13px;
    font-family: var(--mono);
    font-weight: 500;
    transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    white-space: nowrap;
    z-index: 100;
  }

  .toast.show { transform: translateX(-50%) translateY(0); }

  /* Hidden inputs */
  #file-input, #camera-input { display: none; }

  /* Error */
  .error-msg {
    font-family: var(--mono);
    font-size: 12px;
    color: #ff6b6b;
    text-align: center;
    padding: 8px;
    display: none;
  }
  .error-msg.visible { display: block; }
</style>
</head>
<body>

<header>
  <span class="logo">Flyer Scan</span>
  <div style="display:flex;align-items:center;gap:14px;">
    <div class="status-dot" id="status-dot"></div>
    <button class="reload-btn" onclick="location.reload()" title="Reload">
      <svg viewBox="0 0 24 24" stroke-width="1.5"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
    </button>
  </div>
</header>

<main>
  <div class="drop-zone" id="drop-zone">
    <img class="preview" id="preview-img" style="display:none" alt="">
    <div class="overlay-text" id="drop-text">
      <div class="drop-icon">
        <svg viewBox="0 0 24 24" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="3"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
      </div>
      <span class="drop-label">Drop a flyer here</span>
      <span class="drop-sub">or use buttons below</span>
    </div>
  </div>

  <div class="btn-row">
    <button class="btn" id="camera-btn">
      <svg viewBox="0 0 24 24" stroke-width="1.5"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
      Camera
    </button>
    <button class="btn" id="gallery-btn">
      <svg viewBox="0 0 24 24" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
      Gallery
    </button>
    <button class="btn primary" id="scan-btn" disabled>
      <svg viewBox="0 0 24 24" stroke-width="2"><polyline points="4 7 4 4 20 4 20 7"/><line x1="9" y1="20" x2="15" y2="20"/><line x1="12" y1="4" x2="12" y2="20"/></svg>
      Scan Event
    </button>
  </div>

  <div class="error-msg" id="error-msg"></div>

  <div class="loading-state" id="loading-state">
    <div class="spinner"></div>
    <span class="loading-text">reading flyer</span>
    <span class="loading-sub">extracting event details...</span>
  </div>

  <div class="result-card" id="result-card">
    <div class="result-header">
      <span class="result-title">Event detected</span>
      <span class="result-badge">tap date to save</span>
    </div>
    <div class="event-text" id="event-text"></div>
    <div class="copy-hint">
      <svg viewBox="0 0 24 24" stroke-width="1.5"><path d="M9 9H6a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h9a2 2 0 0 0 2-2v-3"/><rect x="9" y="3" width="12" height="12" rx="2"/></svg>
      long-press the date to create a calendar entry
    </div>
  </div>
</main>

<div class="toast" id="toast"></div>

<input type="file" id="file-input" accept="image/*">
<input type="file" id="camera-input" accept="image/*" capture="environment">

<script>
const ANTHROPIC_KEY = 'YOUR_API_KEY_HERE';

const dropZone = document.getElementById('drop-zone');
const previewImg = document.getElementById('preview-img');
const dropText = document.getElementById('drop-text');
const scanBtn = document.getElementById('scan-btn');
const cameraBtn = document.getElementById('camera-btn');
const galleryBtn = document.getElementById('gallery-btn');
const fileInput = document.getElementById('file-input');
const cameraInput = document.getElementById('camera-input');
const loadingState = document.getElementById('loading-state');
const resultCard = document.getElementById('result-card');
const eventText = document.getElementById('event-text');
const errorMsg = document.getElementById('error-msg');
const statusDot = document.getElementById('status-dot');
const toast = document.getElementById('toast');

let currentImageBase64 = null;
let currentMediaType = 'image/jpeg';

statusDot.classList.add('ready');

function showToast(msg) {
  toast.textContent = msg;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 2200);
}

function setImage(file) {
  currentMediaType = file.type || 'image/jpeg';
  const reader = new FileReader();
  reader.onload = e => {
    const dataUrl = e.target.result;
    currentImageBase64 = dataUrl.split(',')[1];
    previewImg.src = dataUrl;
    previewImg.style.display = 'block';
    dropZone.classList.add('has-image');
    dropText.querySelector('.drop-label').textContent = 'Image loaded';
    dropText.querySelector('.drop-sub').textContent = 'tap Scan Event';
    scanBtn.disabled = false;
    resultCard.classList.remove('visible');
    loadingState.classList.remove('visible');
    errorMsg.classList.remove('visible');
  };
  reader.readAsDataURL(file);
}

cameraBtn.addEventListener('click', () => cameraInput.click());
galleryBtn.addEventListener('click', () => fileInput.click());
fileInput.addEventListener('change', e => { if (e.target.files[0]) setImage(e.target.files[0]); });
cameraInput.addEventListener('change', e => { if (e.target.files[0]) setImage(e.target.files[0]); });

dropZone.addEventListener('click', () => { if (!currentImageBase64) fileInput.click(); });

dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
dropZone.addEventListener('drop', e => {
  e.preventDefault();
  dropZone.classList.remove('drag-over');
  const file = e.dataTransfer.files[0];
  if (file && file.type.startsWith('image/')) setImage(file);
});

function formatEventText(raw) {
  const lines = raw.trim().split('\n');
  let html = '';
  for (const line of lines) {
    const trimmed = line.trim();
    if (!trimmed) { html += '\n'; continue; }
    if (/^(event|title|name):/i.test(trimmed) ||
        /^\d{1,2}\s+(jan|feb|mar|apr|may|jun|jul|aug|sep|oct|nov|dec)/i.test(trimmed) ||
        /^(date|time|when|where|location|venue):/i.test(trimmed)) {
      html += `<span class="highlight">${trimmed}</span>\n`;
    } else {
      html += trimmed + '\n';
    }
  }
  return html.trim();
}

scanBtn.addEventListener('click', async () => {
  if (!currentImageBase64) return;

  loadingState.classList.add('visible');
  resultCard.classList.remove('visible');
  errorMsg.classList.remove('visible');
  scanBtn.disabled = true;

  const systemPrompt = `You extract event information from photos of flyers, posters, and event announcements.

Return ONLY a plain text block — no markdown, no JSON, no headers. Format exactly like this:

[Event Name]
[Day, Date Month Year] at [Time] [Timezone if visible]
[Venue/Location]
[City]

[Brief description or lineup if relevant, max 2 lines]

If any field is unknown, omit it. Write the date in full (e.g. "Thursday, 8 May 2026 at 20:00") so iOS can detect it as a tappable date link. Be concise.`;

  try {
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': ANTHROPIC_KEY,
        'anthropic-version': '2023-06-01'
      },
      body: JSON.stringify({
        model: 'claude-opus-4-5',
        max_tokens: 400,
        system: systemPrompt,
        messages: [{
          role: 'user',
          content: [{
            type: 'image',
            source: {
              type: 'base64',
              media_type: currentMediaType,
              data: currentImageBase64
            }
          }, {
            type: 'text',
            text: 'Extract the event details from this flyer.'
          }]
        }]
      })
    });

    const data = await response.json();

    if (!response.ok) {
      throw new Error(data.error?.message || 'API error');
    }

    const text = data.content?.[0]?.text || '';
    if (!text.trim()) throw new Error('No event details found');

    eventText.innerHTML = formatEventText(text);
    resultCard.classList.add('visible');
    showToast('Event extracted');

  } catch (err) {
    errorMsg.textContent = err.message || 'Something went wrong';
    errorMsg.classList.add('visible');
  } finally {
    loadingState.classList.remove('visible');
    scanBtn.disabled = false;
  }
});
</script>
</body>
</html>
